name: Apply Cloudflare Hardening

# Manual trigger only — makes live changes to Cloudflare WAF and header rules.
# Required secrets:
#   CLOUDFLARE_API_TOKEN  — Zone WAF + Transform Edit permissions
#   (Admin IP is auto-detected from the existing WAF bypass rule — no extra secret needed)
on:
  workflow_dispatch:
    inputs:
      zone:
        description: 'Cloudflare zone (default: aboutcloud.io)'
        required: false
        default: 'aboutcloud.io'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Apply CF hardening
        shell: pwsh
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          .\infra\apply-cf-hardening.ps1 -Zone "${{ github.event.inputs.zone }}"

      - name: Export updated rules (IP auto-redacted)
        shell: pwsh
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          .\infra\export-cf-rules.ps1 -Zone "${{ github.event.inputs.zone }}"

      - name: Commit updated cloudflare-rules.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/security/cloudflare-rules.md
          if git diff --cached --quiet; then
            echo "No changes to cloudflare-rules.md."
          else
            git commit -m "chore: update cloudflare-rules.md after hardening [skip ci]"
            git push
          fi
