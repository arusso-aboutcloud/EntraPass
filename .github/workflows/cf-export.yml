name: Export Cloudflare Rules

on:
  workflow_dispatch:
    inputs:
      zone:
        description: 'Cloudflare zone to export (default: aboutcloud.io)'
        required: false
        default: 'aboutcloud.io'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Export Cloudflare rules (IP auto-redacted)
        shell: pwsh
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          .\infra\export-cf-rules.ps1 -Zone "${{ github.event.inputs.zone }}"

      - name: Commit updated rules (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/security/cloudflare-rules.md
          if git diff --cached --quiet; then
            echo "No changes to cloudflare-rules.md — nothing to commit."
          else
            git commit -m "chore: update cloudflare-rules.md [skip ci]"
            git push
          fi
