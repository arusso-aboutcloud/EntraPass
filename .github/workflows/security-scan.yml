# Security scan with Trivy
name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # every Monday 6AM UTC

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (for filesystem scan)
        run: npm run build
        env:
          VITE_CLIENT_ID: dummy
          VITE_TENANT_ID: dummy

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0
          scanners: vuln,secret,misconfig

      - name: Upload Trivy filesystem results to GitHub Security
        uses: github/codeql-action/upload-sarif@v5
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      - name: Run Trivy on repo (table output)
        uses: aquasecurity/trivy-action@0.30.0
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM

      - name: Run Trivy on npm dependencies
        uses: aquasecurity/trivy-action@0.30.0
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          scanners: vuln
          ignore-unfixed: true

      - name: Run Trivy on Dockerfile (if exists)
        uses: aquasecurity/trivy-action@0.30.0
        if: hashFiles('Dockerfile') != ''
        continue-on-error: true
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Generate Trivy summary badge
        run: |
          echo '| Severity | Count |' >> \
          echo '|----------|-------|' >> \
          echo '| ?? Critical | ?? See SARIF report |' >> \
          echo '| ?? High | ?? See SARIF report |' >> \
          echo '| ?? Medium | ?? See SARIF report |' >> \
          echo '| ?? Low | ? Checked by Trivy |' >> \
          echo '' >> \
          echo '### ?? Trivy Security Scan Complete' >> \
          echo '' >> \
          echo 'Results uploaded to **GitHub Security** tab ? Code Scanning Alerts' >> \
          echo '' >> \
          echo '| Scan Type | Status |' >> \
          echo '|-----------|--------|' >> \
          echo '| Filesystem (vulns + secrets + misconfigs) | ? SARIF uploaded |' >> \
          echo '| NPM dependencies (CRITICAL/HIGH only) | ? Checked |' >> \
          echo '| IaC misconfigurations | ? Scanned |' >> \

