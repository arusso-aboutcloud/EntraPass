# EntraPass - Wrangler Configuration
# This file is generated by CI/CD. Do not edit manually.

name = "entrapass"
compatibility_date = "2025-01-01"

pages_build_output_dir = "dist"

# AI Worker
[[services]]
binding = "AI"
service = "ai-worker"

[vars]
ENVIRONMENT = "production"
# Origin allowed to call the optional AI worker (workers/ai.js).
# Set this to your deployed EntraPass URL. The worker rejects all other origins.
ALLOWED_ORIGIN = "https://entrapass.aboutcloud.io"
